---
# OpenVPN Server + Admin Panel
# Run: docker compose -f docker-compose.panel.yml up -d
# Access panel: http://localhost:3000
# Default login: admin / admin

services:
  openvpn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openvpn-server
    hostname: openvpn-server
    privileged: true
    cgroupns: host
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "${VPN_PORT:-1194}:1194/udp"
      - "${PANEL_PORT:-3000}:3000/tcp"
    volumes:
      - openvpn-data:/etc/openvpn
      - openvpn-clients:/root
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    environment:
      # VPN configuration (only used on first install)
      - VPN_ENDPOINT=${VPN_ENDPOINT:-}
      - VPN_PORT=${VPN_PORT:-1194}
      - VPN_PROTOCOL=${VPN_PROTOCOL:-udp}
      - VPN_DNS=${VPN_DNS:-cloudflare}
      - VPN_FIRST_CLIENT=${VPN_FIRST_CLIENT:-client}
      # Panel configuration
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
    stop_signal: SIGRTMIN+3
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pgrep openvpn && curl -sf http://localhost:3000/api/me || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  openvpn-data:
  openvpn-clients:
